name: 🚀 Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy_frontend:
    name: ☁️ Deploy frontend to Cloudflare Pages
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - name: Align pnpm store for Actions cache
        run: |
          pnpm config set store-dir "${{ github.workspace }}/.pnpm-store"
          mkdir -p "$(pnpm store path --silent)"

      - name: ⬢ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: 📚 Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: 🔖 Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: 🔨 Build frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_BUILD_HASH: ${{ env.SHORT_SHA }}
        run: cd frontend && pnpm run build

      - name: ☁️ Deploy frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: >
          npx wrangler@3.90.0 pages deploy frontend/dist
          --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
          --branch=main

  deploy_backend:
    name: 🐳 Deploy backend to Coolify
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: 🔖 Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: 🏷️ Update BUILD_HASH env var in Coolify
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PATCH "${{ secrets.COOLIFY_API_URL }}/api/v1/applications/${{ secrets.COOLIFY_SERVICE_UUID }}/envs" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"BUILD_HASH\",\"value\":\"$SHORT_SHA\",\"is_preview\":false,\"is_shown_once\":false}")

          echo "Response status: $STATUS"
          if [[ "$STATUS" -lt 200 || "$STATUS" -ge 300 ]]; then
            echo "❌ Failed to update env var (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ BUILD_HASH updated successfully"

      - name: 🚀 Trigger Coolify deployment
        run: |
          curl -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"
